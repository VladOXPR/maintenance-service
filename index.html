<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CUUB — Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-page: #000000;
      --bg-elevated: #0a0a0a;
      --bg-muted: #262626;
      --border-subtle: #262626;
      --border-input: #333333;
      --border-strong: #404040;
      --text-primary: #ffffff;
      --text-secondary: #a3a3a3;
      --text-tertiary: #737373;
      --text-muted: #525252;
      --accent-primary: #0099FF;
      --accent-primary-hover: #008ae6;
      --success: #22c55e;
      --danger: #ef4444;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.45;
    }

    .app-shell {
      min-height: 100vh;
    }

    .main-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      justify-content: center;
      padding: 1rem 1.25rem 1.5rem;
    }

    .main-content {
      width: 100%;
      max-width: 1200px;
    }

    .page-header {
      margin-bottom: 1.25rem;
    }

    .page-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .page-header-row .page-title {
      margin-bottom: 0;
    }

    .btn-add-ticket {
      flex-shrink: 0;
      width: 2.25rem;
      height: 2.25rem;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      font-weight: 600;
      line-height: 1;
      background: var(--accent-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-family: inherit;
    }

    .btn-add-ticket:hover {
      background: var(--accent-primary-hover);
    }

    .page-title {
      margin: 0 0 0.5rem;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .page-desc {
      margin: 0;
      font-size: 0.9rem;
      color: var(--text-secondary);
      max-width: 42rem;
    }

    /* KPI — compact count only (~¼ previous visual scale) */
    .kpi-row {
      margin-bottom: 1.25rem;
    }

    .card {
      background: var(--bg-page);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
    }

    .card.kpi-card {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.35rem 0.65rem;
      min-width: 0;
    }

    .kpi-value {
      font-size: calc(75px / 4);
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }

    /* Tickets card */
    .tickets-card .card-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem 1rem;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-subtle);
    }

    .card-title {
      margin: 0;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
    }

    .status {
      font-size: 0.85rem;
      color: var(--text-tertiary);
      margin: 0;
      flex: 1;
      min-width: 12rem;
    }

    .status.error {
      color: var(--danger);
    }

    .ticket-list-wrap {
      margin: 0;
    }

    .ticket-list-wrap.is-empty #ticket-list {
      display: none;
    }

    .ticket-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .ticket-block {
      margin: 0;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      cursor: grab;
    }

    .ticket-block.dragging {
      opacity: 0.55;
    }

    .ticket-block:active {
      cursor: grabbing;
    }

    /* Status-colored blocks (telegram-derived tickets) */
    .ticket-block.ticket--red {
      background: rgba(239, 68, 68, 0.18);
      border-color: rgba(239, 68, 68, 0.45);
    }

    .ticket-block.ticket--yellow {
      background: rgba(234, 179, 8, 0.14);
      border-color: rgba(234, 179, 8, 0.4);
    }

    .ticket-block-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.25rem;
    }

    .ticket-block-main {
      min-width: 0;
      flex: 1;
    }

    .ticket-station-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-primary);
      margin-bottom: 0.35rem;
    }

    .ticket-service {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .ticket-grip {
      flex-shrink: 0;
      color: var(--text-muted);
      user-select: none;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    .ticket-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .btn-ticket-delete {
      padding: 0.35rem 0.55rem;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(239, 68, 68, 0.5);
      background: rgba(239, 68, 68, 0.12);
      color: #fca5a5;
      cursor: pointer;
    }

    .btn-ticket-delete:hover {
      background: rgba(239, 68, 68, 0.22);
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.65);
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-backdrop.is-open {
      display: flex;
    }

    .modal-panel {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: var(--bg-page);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
    }

    .modal-title {
      margin: 0 0 1rem;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .form-row {
      margin-bottom: 1rem;
    }

    .form-row label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.35rem;
    }

    .form-row select {
      width: 100%;
      background: var(--bg-muted);
      border: 1px solid var(--border-input);
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      font-family: inherit;
    }

    .form-row select:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    .form-row textarea {
      width: 100%;
      background: var(--bg-muted);
      border: 1px solid var(--border-input);
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      font-family: inherit;
      resize: vertical;
      min-height: 2.75rem;
    }

    .form-row textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    .form-station-hint {
      margin: 0.35rem 0 0;
      font-size: 0.8rem;
      color: var(--text-tertiary);
      line-height: 1.35;
    }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1.25rem;
    }

    .modal-error {
      font-size: 0.85rem;
      color: var(--danger);
      margin-bottom: 0.75rem;
      min-height: 1.2em;
    }

    /* Buttons (for future actions) */
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent-primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-primary-hover);
    }

    .btn-secondary {
      background: var(--bg-muted);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: #333333;
    }

    .empty-state {
      padding: 1.5rem 1rem;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .main-wrap {
        padding: 1rem;
      }

      .btn {
        width: 100%;
      }

      .modal-actions .btn {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="main-wrap">
      <main class="main-content">
        <header class="page-header">
          <div class="page-header-row">
            <h1 class="page-title">Maintenance tickets</h1>
            <button type="button" class="btn-add-ticket" id="btn-create-ticket" title="Create ticket" aria-label="Create ticket">+</button>
          </div>
          <p class="page-desc">
            Stations that need servicing (yellow or red slot status), aligned with Telegram alerts.
            Drag rows to reorder the queue.
          </p>
        </header>

        <div id="modal-create" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-create-title" aria-hidden="true">
          <div class="modal-panel">
            <h2 id="modal-create-title" class="modal-title">Create ticket</h2>
            <p id="modal-create-error" class="modal-error" aria-live="polite"></p>
            <form id="form-create-ticket">
              <div class="form-row">
                <label for="create-station">Station</label>
                <select id="create-station" name="station" required>
                  <option value="">Select station</option>
                </select>
                <p id="create-station-id-hint" class="form-station-hint">Choose a station — its ID is sent with the ticket.</p>
              </div>
              <div class="form-row">
                <label for="create-issue">Issue type</label>
                <select id="create-issue" name="issue" required>
                  <option value="">Select issue</option>
                  <option value="High Batteries">High Batteries</option>
                  <option value="Low Batteries">Low Batteries</option>
                  <option value="No Batteries">No Batteries</option>
                  <option value="Add Stack">Add Stack</option>
                  <option value="Broken Battery">Broken Battery</option>
                  <option value="High Failure Rates">High Failure Rates</option>
                  <option value="Hardware Malfunction">Hardware Malfunction</option>
                  <option value="Unusually Offline">Unusually Offline</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="form-row">
                <label for="create-description">Description (optional)</label>
                <textarea id="create-description" name="description" rows="2" placeholder="Notes for the team"></textarea>
              </div>
              <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="modal-create-cancel">Cancel</button>
                <button type="submit" class="btn btn-primary">Add ticket</button>
              </div>
            </form>
          </div>
        </div>

        <section class="kpi-row" aria-live="polite" aria-label="Active ticket count">
          <div class="card kpi-card">
            <div class="kpi-value" id="ticket-count">0</div>
          </div>
        </section>

        <section class="card tickets-card">
          <div class="card-header">
            <h2 class="card-title">Queue</h2>
            <p id="status-line" class="status"></p>
          </div>
          <div class="ticket-list-wrap">
            <ul id="ticket-list" class="ticket-list" aria-label="Maintenance tickets"></ul>
            <p id="ticket-empty" class="empty-state" hidden>No tickets in queue.</p>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="maintenance.js" defer></script>
</body>
</html>
