<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CUUB — Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-page: #000000;
      --bg-elevated: #0a0a0a;
      --bg-muted: #262626;
      --border-subtle: #262626;
      --border-input: #333333;
      --border-strong: #404040;
      --text-primary: #ffffff;
      --text-secondary: #a3a3a3;
      --text-tertiary: #737373;
      --text-muted: #525252;
      --accent-primary: #0099FF;
      --accent-primary-hover: #008ae6;
      --success: #22c55e;
      --danger: #ef4444;
      --sidebar-border: #1a1a1a;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.45;
    }

    .app-shell {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--bg-page);
      border-right: 1px solid var(--sidebar-border);
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .sidebar-brand {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .sidebar-link {
      display: block;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      border: 1px solid transparent;
    }

    .sidebar-link:hover {
      color: var(--text-primary);
      background: var(--bg-muted);
    }

    .sidebar-link.is-active {
      color: var(--text-primary);
      background: var(--bg-muted);
      border-color: var(--border-input);
    }

    /* Main */
    .main-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      justify-content: center;
      padding: 1rem 1.25rem 1.5rem;
    }

    .main-content {
      width: 100%;
      max-width: 1200px;
    }

    .page-header {
      margin-bottom: 1.25rem;
    }

    .page-title {
      margin: 0 0 0.5rem;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .page-desc {
      margin: 0;
      font-size: 0.9rem;
      color: var(--text-secondary);
      max-width: 42rem;
    }

    /* KPI */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .card {
      background: var(--bg-page);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
    }

    .kpi-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .kpi-value {
      font-size: 75px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }

    .kpi-meta {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--text-tertiary);
    }

    /* Tickets card */
    .tickets-card .card-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem 1rem;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-subtle);
    }

    .card-title {
      margin: 0;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
    }

    .status {
      font-size: 0.85rem;
      color: var(--text-tertiary);
      margin: 0;
      flex: 1;
      min-width: 12rem;
    }

    .status.error {
      color: var(--danger);
    }

    .table-wrap {
      overflow-x: auto;
      margin: 0 -0.25rem;
      padding: 0 0.25rem;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      border: 2px solid var(--border-strong);
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-elevated);
    }

    .data-table thead th {
      text-align: left;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-page);
    }

    .data-table tbody tr {
      border-bottom: 1px solid var(--border-subtle);
    }

    .data-table tbody tr:last-child {
      border-bottom: none;
    }

    .ticket-row td {
      padding: 0.75rem 1rem;
      vertical-align: middle;
    }

    .ticket-row {
      cursor: grab;
    }

    .ticket-row.dragging {
      opacity: 0.55;
    }

    .ticket-row:active {
      cursor: grabbing;
    }

    .col-name {
      font-weight: 600;
      color: var(--text-primary);
    }

    .col-service {
      color: var(--text-secondary);
    }

    .col-grip {
      width: 2.5rem;
      text-align: right;
      color: var(--text-muted);
      user-select: none;
      font-size: 0.85rem;
    }

    /* Chips — dark, bordered */
    .chip {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.35rem 0.5rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-input);
      background: var(--bg-muted);
      color: var(--text-primary);
    }

    .chip-red {
      border-color: rgba(239, 68, 68, 0.45);
      color: #fca5a5;
      background: rgba(239, 68, 68, 0.12);
    }

    .chip-yellow {
      border-color: var(--border-strong);
      color: var(--text-secondary);
      background: var(--bg-muted);
    }

    /* Buttons (for future actions) */
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent-primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-primary-hover);
    }

    .btn-secondary {
      background: var(--bg-muted);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: #333333;
    }

    .empty-state {
      padding: 1.5rem 1rem;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .app-shell {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--sidebar-border);
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1rem;
      }

      .sidebar-nav {
        flex-direction: row;
      }

      .kpi-value {
        font-size: clamp(48px, 18vw, 75px);
      }

      .main-wrap {
        padding: 1rem;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation">
      <div class="sidebar-brand">CUUB</div>
      <nav class="sidebar-nav">
        <a class="sidebar-link is-active" href="/">Maintenance</a>
      </nav>
    </aside>

    <div class="main-wrap">
      <main class="main-content">
        <header class="page-header">
          <h1 class="page-title">Maintenance tickets</h1>
          <p class="page-desc">
            Stations that need servicing (yellow or red slot status), aligned with Telegram alerts.
            Drag rows to reorder the queue.
          </p>
        </header>

        <section class="kpi-row" aria-live="polite">
          <div class="card">
            <div class="kpi-label">Active tickets</div>
            <div class="kpi-value" id="ticket-count">0</div>
            <p class="kpi-meta">Requires attention · slot capacity</p>
          </div>
        </section>

        <section class="card tickets-card">
          <div class="card-header">
            <h2 class="card-title">Queue</h2>
            <p id="status-line" class="status"></p>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th scope="col">Station</th>
                  <th scope="col">Service type</th>
                  <th scope="col">Status</th>
                  <th scope="col" aria-label="Reorder"></th>
                </tr>
              </thead>
              <tbody id="ticket-list"></tbody>
            </table>
            <p id="ticket-empty" class="empty-state" hidden>No tickets in queue.</p>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="maintenance.js" defer></script>
</body>
</html>
